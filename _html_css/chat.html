<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css"
    integrity="sha256-mmgLkCYLUQbXn0B1SRqzHar6dCnv9oZFPEC1g1cwlkk="
    crossorigin="anonymous" />
  <link rel="stylesheet" href="css/style.css" />
  <title>CodeLink Chat</title>
</head>
<body>
  <div class="chat-container">
    <header class="chat-header">
      <h1><i class="fas fa-smile"></i> CodeLink</h1>
      <a id="leave-btn" href="index.html" class="btn">Leave Room</a>
    </header>

    <main class="chat-main">
      <div class="chat-sidebar">
        <h3><i class="fas fa-comments"></i> Room Name:</h3>
        <h2 id="room-name">—</h2>

        <h3><i class="fas fa-users"></i> Users</h3>
        <ul id="users"><!-- filled dynamically --></ul>
      </div>

      <div id="chat-messages" class="chat-messages"><!-- messages render here --></div>
    </main>

    <div class="chat-form-container">
      <form id="chat-form">
        <input
          id="msg"
          type="text"
          placeholder="Enter Message"
          required
          autocomplete="off"
        />
        <button class="btn"><i class="fas fa-paper-plane"></i> Send</button>
      </form>
    </div>
  </div>

  <!-- Socket.io client (served by your Express app) -->
  <script src="/socket.io/socket.io.js"></script>
  <!-- Qs: parse ?username=&room= from URL -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qs/6.9.2/qs.min.js"
          integrity="sha512-XoA3Dq5Z7mGvQd7n4Sg2gKRUuQd7H9JmQ9l3tJbF8G6cN3kzv8z8p9wz4lC0S7Tq6I1t6wGzv3b5H7Z9E9f+HQ=="
          crossorigin="anonymous"></script>
  <!-- Your app logic -->
  <script src="js/main.js"></script>
</body>
</html>
